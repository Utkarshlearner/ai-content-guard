AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda function for AI Content Guard summarizer

Parameters:
  ProjectName:
    Type: String
    Default: ai-content-guard
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - production
      - staging
      - development
  Owner:
    Type: String
    Default: utkarsh
  LambdaRoleArn:
    Type: String
    Description: ARN of the Lambda execution role
  DynamoDBTableName:
    Type: String
    Description: Name of the DynamoDB table

Resources:
  SummarizerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-summarizer'
      Runtime: python3.12
      Handler: index.handler
      Role: !Ref LambdaRoleArn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref DynamoDBTableName
          GUARDRAIL_ID_SSM_PATH: !Sub '/${ProjectName}/guardrail/id'
          GUARDRAIL_VERSION_SSM_PATH: !Sub '/${ProjectName}/guardrail/version'
          MODEL_ID: amazon.nova-lite-v1:0
      Code:
        ZipFile: |
          """
          AI Content Guard - Lambda Handler
          AI-powered text summarizer with content safety guardrails.
          Uses Amazon Bedrock for summarization and Bedrock Guardrails for content filtering.
          Guardrail configuration is fetched from SSM Parameter Store.
          """

          import json
          import os
          import uuid
          import time
          import logging
          from datetime import datetime, timezone

          import boto3
          from botocore.exceptions import ClientError

          # Logging setup
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Configuration
          TABLE_NAME = os.environ["TABLE_NAME"]
          GUARDRAIL_ID_SSM_PATH = os.environ["GUARDRAIL_ID_SSM_PATH"]
          GUARDRAIL_VERSION_SSM_PATH = os.environ["GUARDRAIL_VERSION_SSM_PATH"]
          MODEL_ID = os.environ.get("MODEL_ID", "amazon.nova-lite-v1:0")

          logger.info(f"Lambda initialized | MODEL_ID={MODEL_ID} | TABLE={TABLE_NAME}")

          # AWS Clients
          bedrock_runtime = boto3.client("bedrock-runtime")
          ssm_client = boto3.client("ssm")
          dynamodb = boto3.resource("dynamodb")
          table = dynamodb.Table(TABLE_NAME)

          # Cached SSM values (loaded once per cold start)
          _guardrail_config = {}


          def _get_guardrail_config():
              """Fetch guardrail ID and version from SSM Parameter Store."""
              global _guardrail_config
              if _guardrail_config:
                  return _guardrail_config

              logger.info(f"Fetching guardrail config from SSM: {GUARDRAIL_ID_SSM_PATH}, {GUARDRAIL_VERSION_SSM_PATH}")

              response = ssm_client.get_parameters(
                  Names=[GUARDRAIL_ID_SSM_PATH, GUARDRAIL_VERSION_SSM_PATH],
                  WithDecryption=False,
              )

              params = {p["Name"]: p["Value"] for p in response["Parameters"]}

              invalid = response.get("InvalidParameters", [])
              if invalid:
                  logger.error(f"SSM parameters not found: {invalid}")
                  raise RuntimeError(f"SSM parameters not found: {invalid}")

              _guardrail_config = {
                  "guardrail_id": params[GUARDRAIL_ID_SSM_PATH],
                  "guardrail_version": params[GUARDRAIL_VERSION_SSM_PATH],
              }
              logger.info(f"Guardrail config loaded | ID={_guardrail_config['guardrail_id']} | Version={_guardrail_config['guardrail_version']}")
              return _guardrail_config


          def handler(event, context):
              """Main Lambda handler for POST /summarize."""
              request_id = str(uuid.uuid4())
              logger.info(f"[{request_id}] Request received")

              try:
                  body = json.loads(event.get("body", "{}"))
                  text = body.get("text", "").strip()

                  if not text:
                      logger.warning(f"[{request_id}] Empty text received")
                      return _response(400, {"error": "Missing 'text' field in request body."})

                  if len(text) > 10000:
                      logger.warning(f"[{request_id}] Text too long: {len(text)} chars")
                      return _response(400, {"error": "Text exceeds maximum length of 10,000 characters."})

                  logger.info(f"[{request_id}] Input length: {len(text)} chars")
                  created_at = datetime.now(timezone.utc).isoformat()

                  # Load guardrail config from SSM
                  guardrail = _get_guardrail_config()

                  # Step 1: Apply guardrail to input text
                  logger.info(f"[{request_id}] Step 1: Applying input guardrail")
                  guardrail_result = _apply_guardrail(text, "INPUT", guardrail)
                  logger.info(f"[{request_id}] Input guardrail result: action={guardrail_result['action']}, violations={len(guardrail_result['violations'])}")

                  anonymized_types = []
                  if guardrail_result["action"] == "GUARDRAIL_INTERVENED":
                      # Check if all violations are ANONYMIZED (not BLOCKED)
                      all_anonymized = all(v.get("action") == "ANONYMIZED" for v in guardrail_result["violations"])
                      if all_anonymized and guardrail_result.get("output"):
                          # PII was anonymized — use the cleaned text for summarization
                          logger.info(f"[{request_id}] Input PII anonymized, continuing with cleaned text")
                          anonymized_types = list(set(v["category"] for v in guardrail_result["violations"]))
                          text = guardrail_result["output"]
                      else:
                          # Content was hard-blocked
                          logger.warning(f"[{request_id}] INPUT BLOCKED | violations={json.dumps(guardrail_result['violations'])}")
                          _save_record(request_id, created_at, text, None, "BLOCKED_INPUT", guardrail_result)
                          return _response(422, {
                              "status": "blocked",
                              "reason": "Input content violated safety policy.",
                              "message": guardrail_result.get("output", "Content blocked by safety guardrails."),
                              "violations": guardrail_result.get("violations", []),
                          })

                  # Step 2: Invoke Bedrock model for summarization
                  logger.info(f"[{request_id}] Step 2: Invoking model {MODEL_ID}")
                  summary = _invoke_model(text)
                  logger.info(f"[{request_id}] Summary generated: {len(summary)} chars")

                  # Step 3: Apply guardrail to output summary
                  logger.info(f"[{request_id}] Step 3: Applying output guardrail")
                  output_guardrail = _apply_guardrail(summary, "OUTPUT", guardrail)
                  logger.info(f"[{request_id}] Output guardrail result: action={output_guardrail['action']}")

                  if output_guardrail["action"] == "GUARDRAIL_INTERVENED":
                      all_anonymized = all(v.get("action") == "ANONYMIZED" for v in output_guardrail["violations"])
                      if all_anonymized and output_guardrail.get("output"):
                          # PII in output was anonymized — return the cleaned summary
                          logger.info(f"[{request_id}] Output PII anonymized, returning cleaned summary")
                          summary = output_guardrail["output"]
                          output_anon = list(set(v["category"] for v in output_guardrail["violations"]))
                          anonymized_types = list(set(anonymized_types + output_anon))
                      else:
                          logger.warning(f"[{request_id}] OUTPUT BLOCKED | violations={json.dumps(output_guardrail['violations'])}")
                          _save_record(request_id, created_at, text, summary, "BLOCKED_OUTPUT", output_guardrail)
                          return _response(422, {
                              "status": "blocked",
                              "reason": "Generated summary violated safety policy.",
                              "message": output_guardrail.get("output", "Content blocked by safety guardrails."),
                              "violations": output_guardrail.get("violations", []),
                          })

                  # Step 4: Save successful result
                  logger.info(f"[{request_id}] Step 4: Saving to DynamoDB")
                  _save_record(request_id, created_at, text, summary, "SUCCESS", None)
                  logger.info(f"[{request_id}] ✓ SUCCESS | summary_length={len(summary)}")

                  response_body = {
                      "status": "success",
                      "summary": summary,
                  }
                  if anonymized_types:
                      response_body["anonymized"] = anonymized_types

                  return _response(200, response_body)

              except ClientError as e:
                  error_code = e.response["Error"]["Code"]
                  logger.error(f"[{request_id}] AWS ClientError: {error_code} - {str(e)}", exc_info=True)

                  if error_code in ("ThrottlingException", "TooManyRequestsException", "ServiceQuotaExceededException"):
                      return _response(429, {"error": "Too many requests. The service is busy, please try again in a few seconds."})
                  elif error_code == "ModelTimeoutException":
                      return _response(504, {"error": "The AI model took too long to respond. Please try again."})
                  elif error_code == "AccessDeniedException":
                      return _response(503, {"error": "AI model access is not available. Please contact support."})
                  else:
                      return _response(500, {"error": "An internal service error occurred. Please try again later."})
              except json.JSONDecodeError as e:
                  logger.error(f"[{request_id}] Invalid JSON: {str(e)}")
                  return _response(400, {"error": "Invalid JSON in request body."})
              except Exception as e:
                  logger.error(f"[{request_id}] Unexpected error: {str(e)}", exc_info=True)
                  return _response(500, {"error": "An unexpected error occurred."})


          def _apply_guardrail(text, source, guardrail):
              """Apply Bedrock Guardrail to text content."""
              response = bedrock_runtime.apply_guardrail(
                  guardrailIdentifier=guardrail["guardrail_id"],
                  guardrailVersion=guardrail["guardrail_version"],
                  source=source,
                  content=[{"text": {"text": text}}],
              )
              action = response.get("action", "NONE")
              output_text = ""
              if response.get("outputs"):
                  output_text = response["outputs"][0].get("text", "")

              # Extract assessment details
              violations = []
              assessments = response.get("assessments", [])
              for assessment in assessments:
                  # Content policy filters
                  content_policy = assessment.get("contentPolicy", {})
                  for filter_item in content_policy.get("filters", []):
                      violations.append({
                          "type": "content_filter",
                          "category": filter_item.get("type", "UNKNOWN"),
                          "confidence": filter_item.get("confidence", "UNKNOWN"),
                          "action": filter_item.get("action", "BLOCKED"),
                      })
                  # Sensitive info (PII)
                  sensitive_info = assessment.get("sensitiveInformationPolicy", {})
                  for pii_item in sensitive_info.get("piiEntities", []):
                      violations.append({
                          "type": "pii_detected",
                          "category": pii_item.get("type", "UNKNOWN"),
                          "action": pii_item.get("action", "BLOCKED"),
                      })
                  # Topic policy
                  topic_policy = assessment.get("topicPolicy", {})
                  for topic in topic_policy.get("topics", []):
                      violations.append({
                          "type": "topic_denied",
                          "category": topic.get("name", "UNKNOWN"),
                          "action": topic.get("action", "BLOCKED"),
                      })

              return {"action": action, "output": output_text, "violations": violations}


          def _invoke_model(text):
              """Invoke Amazon Bedrock model (Nova Lite) to generate a summary."""
              prompt = (
                  "You are a concise summarizer. Summarize the following text in 2-3 sentences. "
                  "Focus on key points and maintain factual accuracy.\n\n"
                  f"Text:\n{text}\n\nSummary:"
              )

              request_body = json.dumps({
                  "messages": [{"role": "user", "content": [{"text": prompt}]}],
                  "inferenceConfig": {"max_new_tokens": 500},
              })

              response = bedrock_runtime.invoke_model(
                  modelId=MODEL_ID,
                  contentType="application/json",
                  accept="application/json",
                  body=request_body,
              )

              response_body = json.loads(response["body"].read())
              return response_body["output"]["message"]["content"][0]["text"].strip()


          def _save_record(request_id, created_at, input_text, summary, status, guardrail_result):
              """Save request/response record to DynamoDB."""
              ttl = int(time.time()) + (30 * 24 * 60 * 60)  # 30 days TTL

              item = {
                  "requestId": request_id,
                  "createdAt": created_at,
                  "inputText": input_text[:1000],
                  "status": status,
                  "ttl": ttl,
              }

              if summary:
                  item["summary"] = summary
              if guardrail_result:
                  item["guardrailAction"] = guardrail_result["action"]

              table.put_item(Item=item)


          def _response(status_code, body):
              """Build API Gateway proxy response with CORS headers."""
              return {
                  "statusCode": status_code,
                  "headers": {
                      "Content-Type": "application/json",
                      "Access-Control-Allow-Origin": "*",
                      "Access-Control-Allow-Headers": "Content-Type,Authorization",
                      "Access-Control-Allow-Methods": "POST,OPTIONS",
                  },
                  "body": json.dumps(body),
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Application
          Value: AI-Content-Guard

  SummarizerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${SummarizerFunction}'
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Application
          Value: AI-Content-Guard

Outputs:
  SummarizerFunctionArn:
    Description: ARN of the summarizer Lambda function
    Value: !GetAtt SummarizerFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-lambda-arn'
  SummarizerFunctionName:
    Description: Name of the summarizer Lambda function
    Value: !Ref SummarizerFunction
    Export:
      Name: !Sub '${ProjectName}-lambda-name'
